    recommendation: "Title: 'About you'. Subtitle: 'A few details so we can personalise your home page.' Clarifies why we're asking."
    depends_on: null

  - finding_id: TW-012
    surface_id: web-auth-onboarding-step-basic
    lens: technical-writer
    severity: P3
