# LOCAL / kind ONLY — the single Secret all HomeChef charts read in local mode.
#
# Production never uses this file: prod credentials are synced from GCP Secret
# Manager via ExternalSecrets (see tesserix-k8s/external-secrets/prod/homechef/).
#
# Copy-and-go:
#   cp k8s/secrets.example.yaml k8s/secrets.yaml
#   # edit values in k8s/secrets.yaml (it is gitignored), then:
#   kubectl create namespace homechef --dry-run=client -o yaml | kubectl apply -f -
#   kubectl apply -f k8s/secrets.yaml
#
# Consumed by (all in tesserix-k8s/charts/apps, via their values-local.yaml):
#   homechef-api             -> DB_PASSWORD, REDIS_PASSWORD, JWT_SECRET,
#                               JWT_REFRESH_SECRET, BFF_INTERNAL_HMAC_KEY
#   homechef-auth-bff        -> GIP_WEB_API_KEY, HOMECHEF_CUSTOMER_CLIENT_SECRET,
#                               HOMECHEF_BUSINESS_CLIENT_SECRET,
#                               HOMECHEF_INTERNAL_CLIENT_SECRET, SESSION_ENCRYPT_KEY,
#                               BFF_INTERNAL_HMAC_KEY, HOMECHEF_ADMIN_ALLOWED_EMAILS
#
# SHARED LOCAL INFRA: HomeChef now connects to the shared local-infra datastores
# (CNPG Postgres / Redis / NATS / Mongo in the local-infra namespace), NOT a
# per-product Postgres. The local-infra chart reflects Secret `local-infra-creds`
# into THIS namespace carrying the SAME throwaway password (local-sandbox-dev) for
# Postgres/Redis/Mongo — so DB_PASSWORD / REDIS_PASSWORD below must equal it
# (local-sandbox-dev) to match the shared homechef Postgres role + Redis requirepass.
# BFF_INTERNAL_HMAC_KEY must match between the API and the BFF.
apiVersion: v1
kind: Secret
metadata:
  name: homechef-local-secrets
  namespace: homechef
type: Opaque
stringData:
  # ---- Postgres (SHARED local-infra CNPG, role homechef / db homechef_db) ----
  # Must equal the shared local-infra password (also in reflected local-infra-creds).
  DB_PASSWORD: "local-sandbox-dev"
  # Kept for structure-compat (no bundled Postgres any more); same value.
  POSTGRES_PASSWORD: "local-sandbox-dev"

  # ---- Redis (SHARED local-infra Redis, requirepass, logical DB 1) ----
  REDIS_PASSWORD: "local-sandbox-dev"

  # ---- API auth / signing ----
  JWT_SECRET: "local-sandbox-dev"
  JWT_REFRESH_SECRET: "local-sandbox-dev"
  # Shared HMAC for the internal BFF -> API trust header. MUST match in both pods.
  BFF_INTERNAL_HMAC_KEY: "local-sandbox-dev"

  # ---- auth-bff (Google Identity Platform + sessions) ----
  # For a fully local flow you can leave the GIP values blank and exercise the
  # API directly; the BFF only needs these when you test the login flow.
  GIP_WEB_API_KEY: ""
  HOMECHEF_CUSTOMER_CLIENT_SECRET: ""
  HOMECHEF_BUSINESS_CLIENT_SECRET: ""
  HOMECHEF_INTERNAL_CLIENT_SECRET: ""
  # 32-byte key for the encrypted session cookie.
  SESSION_ENCRYPT_KEY: "local-dev-session-encrypt-key-32b!"
  # Comma-separated admin allow-list for the internal portal.
  HOMECHEF_ADMIN_ALLOWED_EMAILS: "you@example.com"
