<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Content Security Policy — vendor portal does not load third-party scripts. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://storage.googleapis.com https:; connect-src 'self' https://api.fe3dr.com https://identity.fe3dr.com wss://api.fe3dr.com wss://vendors.fe3dr.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Mobile Optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Fe3dr Vendor Portal" />
    <meta name="application-name" content="Fe3dr Vendor Portal" />

    <!-- Theme & Colors -->
    <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a18" media="(prefers-color-scheme: dark)" />
    <meta name="msapplication-TileColor" content="#1a1a18" />

    <!-- SEO & Social -->
    <meta name="description" content="Fe3dr Vendor Portal - Manage your kitchen, menus, orders, and earnings" />
    <meta name="keywords" content="vendor portal, home chef, kitchen management, food business, menu management" />
    <meta name="author" content="Fe3dr" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fe3dr Vendor Portal" />
    <meta property="og:description" content="Manage your kitchen, menus, orders, and earnings on Fe3dr" />
    <meta property="og:url" content="https://vendors.fe3dr.com" />
    <meta property="og:site_name" content="Fe3dr Vendor Portal" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>Fe3dr Vendor Portal</title>

    <!-- No-flash theme bootstrap. Reads localStorage('hc-theme') + prefers-color-scheme
         and sets the `dark`/`light` class on <html> before React mounts.
         Both classes are toggled mutually-exclusively so the `:not(.light)` CSS
         escape hatch under `@media (prefers-color-scheme: dark)` doesn't fire
         when the user has explicitly chosen Light. -->
    <script>(function(){try{var t=localStorage.getItem('hc-theme');var d=t==='dark'||(t==='auto'||!t)&&window.matchMedia('(prefers-color-scheme: dark)').matches;var r=document.documentElement;r.classList.toggle('dark',d);r.classList.toggle('light',!d);r.dataset.theme=d?'dark':'light';}catch(e){}})();</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
