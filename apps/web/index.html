<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      Content Security Policy — narrowly scoped allowlist.
      script-src: self for our Vite bundles + Razorpay Checkout SDK.
      style-src 'unsafe-inline' is required for runtime-injected styles
      (Tailwind utility classes via JIT, Radix UI portal styles, etc.).
      connect-src covers our API + WebSockets + identity BFF.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-IuIFVLrle2VVlRh5Awd5R2tmobZwk9pnuQ45xrMXu2k=' https://checkout.razorpay.com https://*.razorpay.com https://apis.google.com https://www.gstatic.com https://*.firebaseapp.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://storage.googleapis.com https://*.razorpay.com https:; connect-src 'self' https://api.fe3dr.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com wss://api.fe3dr.com wss://fe3dr.com https://lumberjack.razorpay.com https://*.razorpay.com; frame-src https://api.razorpay.com https://*.razorpay.com https://*.firebaseapp.com https://accounts.google.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Mobile Optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Fe3dr" />
    <meta name="application-name" content="Fe3dr" />

    <!-- Theme & Colors (Paper / Ink / Herb) -->
    <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a18" media="(prefers-color-scheme: dark)" />
    <meta name="msapplication-TileColor" content="#1a1a18" />
    <meta name="msapplication-navbutton-color" content="#1a1a18" />

    <!-- SEO & Social -->
    <meta name="description" content="Fe3dr - Connect with home chefs for authentic homemade food delivered to your doorstep" />
    <meta name="keywords" content="home chef, food delivery, homemade food, local chef, catering" />
    <meta name="author" content="Fe3dr" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fe3dr - Homemade Food Delivered" />
    <meta property="og:description" content="Connect with home chefs for authentic homemade food delivered to your doorstep" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://fe3dr.com" />
    <meta property="og:site_name" content="Fe3dr" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fe3dr - Homemade Food Delivered" />
    <meta name="twitter:description" content="Connect with home chefs for authentic homemade food delivered to your doorstep" />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#1a1a18" />

    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Fonts: Geist (display) + Inter (UI/body) -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>Fe3dr - Homemade Food Delivered</title>

    <!-- No-flash theme bootstrap. Reads localStorage('hc-theme') + prefers-color-scheme
         and sets the `dark`/`light` class on <html> before React mounts.
         Both classes are toggled mutually-exclusively so the `:not(.light)` CSS
         escape hatch under `@media (prefers-color-scheme: dark)` doesn't fire
         when the user has explicitly chosen Light. -->
    <script>(function(){try{var t=localStorage.getItem('hc-theme');var d=t==='dark'||(t==='auto'||!t)&&window.matchMedia('(prefers-color-scheme: dark)').matches;var r=document.documentElement;r.classList.toggle('dark',d);r.classList.toggle('light',!d);r.dataset.theme=d?'dark':'light';}catch(e){}})();</script>

    <!-- Razorpay Checkout SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
