platformDomain: fe3dr.com

products:
  - name: homechef
    domain: fe3dr.com
    apps:
      # Web portals (web / vendor-portal / delivery-portal) sunset — entries
      # removed 2026-06-17 (issue #22) once the browser UIs were retired.
      # Mobile auth does NOT use these app entries (it goes through
      # /auth/auto-login gated by mobileTenantAllowlist below); only the
      # OIDC browser handlers resolve apps by host. admin-portal is retained.
      - name: admin-portal
        hosts: ["admin.fe3dr.com", "localhost:5176"]
        gipTenantId: HomeChef-Internal-gyofe
        oauthClientId: "849928263410-gri0fclh2pdbkgu3g3ppm6npa3kktib9.apps.googleusercontent.com"
        clientSecretEnv: HOMECHEF_INTERNAL_CLIENT_SECRET
        sessionCookie: hc_admin_session
        callbackPath: /auth/callback
        postLoginUrl: /
        authContext: internal
        defaultRole: admin
        signInMethods: [password, google.com]
        allowedEmailsEnv: HOMECHEF_ADMIN_ALLOWED_EMAILS
        allowedOrigins: ["https://admin.fe3dr.com", "http://localhost:5176"]

mobileTenantAllowlist:
  - HomeChef-Customer-rqg8a
  - HomeChef-Business-8s8ql
  # Internal/admin pool — powers the admin mobile app (apps/mobile-admin).
  # The "internal" pool resolves to role=admin in autologin (defaultRoleForPool),
  # so an admin GIP sign-in yields an admin BFF session the API's RequireAdmin
  # gate accepts. Without this entry /auth/auto-login rejects admin logins.
  - HomeChef-Internal-gyofe
