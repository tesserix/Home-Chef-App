<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile Optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Fe3dr Admin" />
    <meta name="application-name" content="Fe3dr Admin" />

    <!-- Theme & Colors -->
    <meta name="theme-color" content="#C2410C" />
    <meta name="msapplication-TileColor" content="#C2410C" />

    <!-- SEO -->
    <meta name="description" content="Fe3dr Admin Portal - Manage users, chefs, orders, and platform analytics" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />

    <title>Fe3dr Admin</title>

    <!-- Prevent FOUC -->
    <style>
      html { visibility: hidden; }
      html.loaded { visibility: visible; }
    </style>
    <script>
      document.documentElement.classList.add('loaded');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
