# EAS Workflow — production release for the Home Chef CUSTOMER app.
#
# Builds the production iOS + Android binaries on EAS and submits them to the
# App Store (App Store Connect / TestFlight) and Google Play.
#
# TRIGGER: manual only (safe default — no accidental store submissions on push).
#   Run it from the Expo dashboard, or:   eas workflow:run release.yml
#   (Run from this app dir: apps/mobile-customer)
#
# PREREQUISITES before this can succeed. Until these exist the submit_* jobs will
# fail — that's expected; the file is committed inert and ready to flip on:
#   iOS:
#     - EAS secret EAS_SECRET_APPLE_TEAM_ID  ......... DONE (2CRHRRYBPL)
#     - EAS secret EAS_SECRET_ASC_APP_ID  ............ PENDING (needs the ASC app record)
#     - App Store Connect API key uploaded to EAS  ... PENDING (eas credentials / dashboard)
#   Android:
#     - submit.production.android in eas.json with a Google Play service-account key  ... PENDING
#     - The FIRST AAB must be uploaded to Play Console by hand before the API accepts uploads.
#
# To go fully push-triggered later, connect the repo to the Expo GitHub App and
# add an `on: push:` trigger (example commented at the bottom).

name: Release customer (production)

on:
  workflow_dispatch: {}

jobs:
  build_ios:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production

  submit_ios:
    name: Submit to App Store Connect
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  build_android:
    name: Build Android (production)
    type: build
    params:
      platform: android
      profile: production

  submit_android:
    name: Submit to Google Play
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production

# ── Optional: auto-release on a version tag (needs the Expo GitHub App connected) ──
# on:
#   push:
#     tags: ['customer-v*']
