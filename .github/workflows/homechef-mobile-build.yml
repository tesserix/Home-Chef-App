name: HomeChef Mobile - EAS Build

# Cloud-builds the four Expo apps (apps/mobile-customer | mobile-vendor |
# mobile-delivery | mobile-admin) on Expo's EAS Build service. The mobile apps
# are NOT Docker images — they ship as native iOS/Android binaries built by EAS,
# so this is a separate path from the GHCR/ArgoCD web+api workflows.
#
# Manual-only (workflow_dispatch) on purpose: native builds consume EAS minutes,
# so we never auto-build on push. Pick the app(s), platform, and profile at run
# time. Builds are queued with --no-wait (the runner returns immediately; track
# progress at https://expo.dev/accounts/tesserix-org/projects).
#
# Requires the EXPO_TOKEN repo secret — an Expo access token for the tesserix-org
# account that owns the homechef-customer / homechef-vendor / homechef-delivery /
# homechef-admin EAS projects. Create one at
# https://expo.dev/accounts/tesserix-org/settings/access-tokens
# then add it via:  gh secret set EXPO_TOKEN --repo tesserix/Home-Chef-App
#
# iOS/production profiles require Apple/Android signing credentials to already be
# configured on the EAS projects; otherwise --non-interactive builds will fail.
#
# TestFlight / Play submission (submit=true) appends `--auto-submit`, which after
# the build uploads it to the store using each app's `submit.production` config
# in eas.json (appleTeamId + ascAppId). For this to run non-interactively in CI
# the EAS project must already hold the credentials — set them up ONCE locally:
#   cd apps/mobile-<app>
#   eas credentials            # iOS → set up Distribution cert + provisioning profile
#   eas credentials            # iOS → App Store Connect API Key (for submit)
# After that one-time interactive setup (needs an Apple login), this workflow can
# build + submit to TestFlight with no GitHub secrets beyond EXPO_TOKEN.

on:
  workflow_dispatch:
    inputs:
      app:
        description: Mobile app(s) to build
        type: choice
        options: [all, customer, vendor, delivery, admin]
        default: all
      platform:
        description: Target platform
        type: choice
        options: [all, ios, android]
        default: all
      profile:
        description: EAS build profile (from eas.json)
        type: choice
        options: [preview, production, development]
        default: preview
      submit:
        description: Submit to store (TestFlight / Play internal) after build
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: mobile-eas-${{ inputs.app }}-${{ inputs.platform }}-${{ inputs.profile }}-${{ inputs.submit }}
  cancel-in-progress: false

jobs:
  build:
    name: EAS build (mobile-${{ matrix.app }})
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ (inputs.app == 'all') && fromJSON('["customer","vendor","delivery","admin"]') || fromJSON(format('["{0}"]', inputs.app)) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure GitHub Packages auth
        # @tesserix/otto-widget is GH-Packages-only and the hoisted layout pulls
        # it into every workspace install, so even mobile needs the token.
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc
      - name: Install dependencies
        # eas build evaluates the app config + Expo config plugins (expo-router,
        # etc.) on the runner before queuing the cloud build, so node_modules
        # must be present. node-linker=hoisted (root .npmrc) gives Expo/RN the
        # flat layout it needs.
        run: pnpm install --filter @homechef/mobile-${{ matrix.app }}... --frozen-lockfile

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EXPO_TOKEN is configured
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::EXPO_TOKEN secret is not set. Add it with: gh secret set EXPO_TOKEN --repo tesserix/Home-Chef-App"
            exit 1
          fi

      - name: Queue EAS build
        working-directory: apps/mobile-${{ matrix.app }}
        # --auto-submit (when submit=true) chains a store submission after the
        # build on EAS servers, using the submit.<profile> config in eas.json.
        run: |
          eas build \
            --platform "${{ inputs.platform }}" \
            --profile "${{ inputs.profile }}" \
            --non-interactive \
            --no-wait \
            ${{ inputs.submit && '--auto-submit' || '' }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## EAS build queued"
            echo ""
            echo "- **App:** mobile-${{ matrix.app }}"
            echo "- **Platform:** ${{ inputs.platform }}"
            echo "- **Profile:** ${{ inputs.profile }}"
            echo "- **Submit to store:** ${{ inputs.submit }}"
            echo "- Track builds: https://expo.dev/accounts/tesserix-org/projects"
          } >> "$GITHUB_STEP_SUMMARY"
