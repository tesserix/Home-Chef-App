name: HomeChef Vendor Portal - CI Build

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
    paths:
      - 'apps/vendor-portal/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/homechef-vendor-portal-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/vendor-portal/**'
      - 'packages/**'
      - '.github/workflows/homechef-vendor-portal-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REGISTRY: ghcr.io
  IMAGE_NAME: tesserix/home-chef-app/homechef-vendor-portal

jobs:
  build:
    name: Build and Push Vendor Portal
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build and Push to GHCR ---
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Only emit `main-<sha7>` on main. No `:latest` — Kargo
          # promotes the newest matching tag from the GAR mirror via
          # the kargo-homechef Project's prod Stage.
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=homechef-vendor-portal
            org.opencontainers.image.description=HomeChef Vendor Portal Application

      - name: Compute cache ref
        id: cache
        run: echo "ref=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/vendor-portal/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://api.fe3dr.com/api/v1' }}
            VITE_BFF_URL=${{ vars.VITE_BFF_URL }}
            VITE_GIP_API_KEY=${{ secrets.GIP_WEB_API_KEY }}
            VITE_GIP_PROJECT_ID=tesseracthub-480811
            VITE_GIP_AUTH_DOMAIN=tesseracthub-480811.firebaseapp.com
            VITE_GIP_TENANT_ID=HomeChef-Business-8s8ql
            VITE_GOOGLE_CLIENT_ID=849928263410-gri0fclh2pdbkgu3g3ppm6npa3kktib9.apps.googleusercontent.com
          secrets: |
            npm_token=${{ secrets.NPM_TOKEN }}
          cache-from: type=registry,ref=${{ steps.cache.outputs.ref }}
          cache-to: type=registry,ref=${{ steps.cache.outputs.ref }},mode=max

      # Image push only — the deploy bump happens in the `bump-k8s` job
      # below, which writes the new main-<sha7> tag (and Knative
      # updateTimestamp) into argocd/prod/apps/homechef/homechef-vendor-portal.yaml
      # in tesserix-k8s. Argo CD picks up the commit and syncs.
      #
      # When kargo-homechef is wired (Project + Warehouse + Stage in
      # tesserix/kargo-manifests), bump-k8s here can be retired in favour
      # of Kargo discovering the GAR-mirrored tag and writing the same
      # helm.parameters field via a PromotionTemplate.

      # --- Security scanning (gated: fails the build on CRITICAL+HIGH) ---
      - name: Run Trivy vulnerability scanner
        id: trivy
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build_push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          limit-severities-for-sarif: true

      - name: Upload Trivy results to GitHub Security tab
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application:** HomeChef Vendor Portal" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture:** AMD64" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "**Docker Image:** Pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
            echo "**Deploy:** bump-k8s job updates argocd/prod/apps/homechef/homechef-vendor-portal.yaml on push to main" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "**Docker Image:** Built successfully (not pushed)" >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Bump tesserix-k8s ArgoCD app to new image tag ──────────────────
  # Uses the GitHub Contents API directly (PUT /contents/{path}) — see
  # homechef-web-build.yml for full rationale.
  bump-k8s:
    name: Bump tesserix-k8s image tag via API
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    env:
      GH_TOKEN: ${{ secrets.TESSERIX_K8S_BOT }}
      REPO: tesserix/tesserix-k8s
      FILE_PATH: argocd/prod/apps/homechef/homechef-vendor-portal.yaml
      SERVICE: homechef-vendor-portal
    steps:
      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Install yq
        run: |
          set -euo pipefail
          if command -v yq >/dev/null; then
            yq --version
            exit 0
          fi
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Bump image tag and Knative updateTimestamp via API
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        run: |
          set -euo pipefail
          # Use plain curl + Bearer header. gh CLI ignores GH_TOKEN inside
          # Actions; curl is deterministic.
          BOT_TOKEN="${GH_TOKEN}"
          NEW_TAG="main-${SHORT_SHA}"
          TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          API="https://api.github.com/repos/${REPO}/contents/${FILE_PATH}"
          AUTH_HDR=(-H "Authorization: Bearer ${BOT_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")

          for attempt in 1 2 3; do
            echo "::group::Attempt ${attempt}: fetch → bump → PUT"
            RESP="$(curl -sS "${AUTH_HDR[@]}" "${API}?ref=main")"
            BLOB_SHA="$(echo "$RESP" | jq -r '.sha // empty')"
            if [ -z "$BLOB_SHA" ]; then
              echo "GET failed:"
              echo "$RESP" | jq -r '.message // .' | head -5
              echo "::endgroup::"
              sleep 2
              continue
            fi
            echo "$RESP" | jq -r .content | base64 -d > /tmp/current.yaml

            yq -i "(.spec.source.helm.parameters[] | select(.name == \"image.tag\")).value = \"${NEW_TAG}\"" /tmp/current.yaml
            NEW_TS="$TIMESTAMP" yq -i '(.spec.source.helm.parameters[] | select(.name | test("updateTimestamp$"))).value = strenv(NEW_TS)' /tmp/current.yaml
            echo "New values:"
            grep -A1 "image\.tag\|updateTimestamp" /tmp/current.yaml | head -8

            NEW_CONTENT="$(base64 -w0 < /tmp/current.yaml)"
            PAYLOAD="$(jq -nc \
              --arg msg "chore(homechef): bump ${SERVICE} to ${NEW_TAG}" \
              --arg content "${NEW_CONTENT}" \
              --arg sha "${BLOB_SHA}" \
              --arg branch main \
              '{message:$msg, content:$content, sha:$sha, branch:$branch}')"

            PUT_RESP="$(curl -sS -X PUT "${AUTH_HDR[@]}" -H "Content-Type: application/json" -d "$PAYLOAD" "$API")"
            COMMIT_SHA="$(echo "$PUT_RESP" | jq -r '.commit.sha // empty')"
            if [ -n "$COMMIT_SHA" ]; then
              echo "Committed tesserix-k8s@${COMMIT_SHA}"
              echo "::endgroup::"
              exit 0
            fi
            echo "PUT failed:"
            echo "$PUT_RESP" | jq -r '.message // .' | head -5
            echo "::endgroup::"
            sleep 2
          done

          echo "Failed to bump after 3 attempts." >&2
          exit 1

      - name: Bump Summary
        if: always()
        run: |
          echo "## Bump Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** tesserix-k8s argocd/prod/apps/homechef/homechef-vendor-portal.yaml" >> $GITHUB_STEP_SUMMARY
          echo "**New tag:** \`main-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Source commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  test:
    name: Run Tests
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure npm for GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        working-directory: apps/vendor-portal
        run: pnpm lint

      - name: Run type check
        working-directory: apps/vendor-portal
        run: pnpm exec tsc --noEmit

      - name: Run tests
        working-directory: apps/vendor-portal
        run: pnpm test -- --passWithNoTests
        continue-on-error: true

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application:** HomeChef Vendor Portal" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Tests completed" >> $GITHUB_STEP_SUMMARY
