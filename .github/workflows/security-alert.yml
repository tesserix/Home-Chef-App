name: Security alert

# Listens for the CI build/release workflows to conclude and emails the
# security distribution list if any of them finished with `failure`.
# Each of those workflows runs Trivy with `exit-code: 1` on CRITICAL+HIGH
# vulns, so a red run at this stage almost always means a new CVE slipped
# into the image. Sending the alert from a separate workflow_run keeps
# the notification path out of the per-portal build files.

on:
  workflow_run:
    workflows:
      - "HomeChef API - CI Build"
      - "HomeChef Web - CI Build"
      - "HomeChef Admin Portal - CI Build"
      - "HomeChef Vendor Portal - CI Build"
      - "HomeChef Delivery Portal - CI Build"
      - "HomeChef API - Release"
      - "HomeChef Web - Release"
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  notify:
    name: Notify — CI build failed (possible security regression)
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send email alert
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[SECURITY] ${{ github.repository }} — ${{ github.event.workflow_run.name }} failed on ${{ github.event.workflow_run.head_branch }}"
          from: "Tesserix Security <${{ secrets.SMTP_USERNAME }}>"
          to: samyak.rout@gmail.com, mahesh.sangawar@gmail.com, unidevidp@gmail.com
          body: |
            A HomeChef CI run finished with `failure`. The Trivy security
            gate (CRITICAL+HIGH, unfixed-ignored) runs inside these
            workflows, so this is almost always a CVE regression in the
            image — please triage immediately.

            Workflow : ${{ github.event.workflow_run.name }}
            Run      : ${{ github.event.workflow_run.html_url }}
            Branch   : ${{ github.event.workflow_run.head_branch }}
            Commit   : ${{ github.event.workflow_run.head_sha }}
            Actor    : ${{ github.event.workflow_run.actor.login }}
            Event    : ${{ github.event.workflow_run.event }}

            Open the run above, expand the `Run Trivy vulnerability
            scanner` step, and copy the CVE list into the follow-up
            issue. Do not merge or deploy until resolved.
