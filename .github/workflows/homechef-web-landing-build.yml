name: HomeChef Web Landing - CI Build

# Builds the fe3dr.com marketing landing (apps/web-landing, Next.js static
# export) and deploys it to the EXISTING `homechef-web` slot — same GHCR image
# name, same ArgoCD app, same fe3dr.com routing. The landing thus REPLACES the
# sunset Vite SPA at fe3dr.com with no routing/DNS change (port 80 matches).
# The old apps/web build/release workflows were removed (see apps/web/SUNSET.md).

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
    paths:
      - 'apps/web-landing/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/homechef-web-landing-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web-landing/**'
      - '.github/workflows/homechef-web-landing-build.yml'
  workflow_dispatch:
  # Nightly rebuild to refresh the build-time SEO chef/cuisine/area pages (#58)
  # from current chef data — the pages are generated at build, so a periodic
  # rebuild + deploy is how new/updated chefs get indexed.
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REGISTRY: ghcr.io
  # Same image name as the sunset SPA — the landing becomes homechef-web.
  IMAGE_NAME: tesserix/home-chef-app/homechef-web

jobs:
  build:
    name: Build and Push HomeChef Web Landing
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # main-<sha7> on main; no :latest (ArgoCD pins the exact tag).
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable=${{ github.event_name != 'pull_request' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=homechef-web
            org.opencontainers.image.description=HomeChef fe3dr.com marketing landing (Next.js static)

      - name: Compute cache ref
        id: cache
        run: echo "ref=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@v7
        with:
          # Build from repo root (the Dockerfile COPYs the pnpm workspace +
          # root .npmrc). The hoisted install pulls @tesserix/otto-widget, which
          # is published only to GitHub Packages, so the build needs the token.
          context: .
          file: apps/web-landing/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            npm_token=${{ secrets.NPM_TOKEN }}
          cache-from: type=registry,ref=${{ steps.cache.outputs.ref }}
          # cache write needs GHCR auth (skipped on PRs); read-only cache-from still works
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0},mode=max', steps.cache.outputs.ref) || '' }}

      - name: Run Trivy vulnerability scanner
        id: trivy
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build_push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          limit-severities-for-sarif: true

      - name: Upload Trivy results to GitHub Security tab
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application:** HomeChef Web Landing (fe3dr.com)" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} (deploys to the homechef-web slot)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  test:
    name: Lint + Typecheck
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --filter @homechef/web-landing... --frozen-lockfile
      - name: Lint
        working-directory: apps/web-landing
        run: pnpm lint
      - name: Type check
        working-directory: apps/web-landing
        run: pnpm exec tsc --noEmit
