name: HomeChef Web Landing - CI Build

# Builds the fe3dr.com marketing landing (apps/web-landing, Next.js static
# export) and deploys it to the EXISTING `homechef-web` slot — same GHCR image
# name, same ArgoCD app, same fe3dr.com routing. The landing thus REPLACES the
# sunset Vite SPA at fe3dr.com with no routing/DNS change (port 80 matches).
# The old apps/web build/release workflows were removed (see apps/web/SUNSET.md).

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
    paths:
      - 'apps/web-landing/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/homechef-web-landing-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web-landing/**'
      - '.github/workflows/homechef-web-landing-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REGISTRY: ghcr.io
  # Same image name as the sunset SPA — the landing becomes homechef-web.
  IMAGE_NAME: tesserix/home-chef-app/homechef-web

jobs:
  build:
    name: Build and Push HomeChef Web Landing
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # main-<sha7> on main; no :latest (ArgoCD pins the exact tag).
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable=${{ github.event_name != 'pull_request' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=homechef-web
            org.opencontainers.image.description=HomeChef fe3dr.com marketing landing (Next.js static)

      - name: Compute cache ref
        id: cache
        run: echo "ref=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@v7
        with:
          # Build from repo root (the Dockerfile COPYs the pnpm workspace +
          # root .npmrc). @tesserix packages resolve from public npm — no
          # token needed. The landing is fully static; no build-args.
          context: .
          file: apps/web-landing/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.cache.outputs.ref }}
          # cache write needs GHCR auth (skipped on PRs); read-only cache-from still works
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0},mode=max', steps.cache.outputs.ref) || '' }}

      - name: Run Trivy vulnerability scanner
        id: trivy
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build_push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          limit-severities-for-sarif: true

      - name: Upload Trivy results to GitHub Security tab
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application:** HomeChef Web Landing (fe3dr.com)" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} (deploys to the homechef-web slot)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ─── Bump tesserix-k8s ArgoCD app to the new image tag ──────────────────
  # Writes the new main-<sha7> tag (+ Knative updateTimestamp) into the
  # EXISTING homechef-web Argo CD Application in tesserix-k8s. Argo CD
  # auto-syncs the homechef-web Knative service → fe3dr.com serves the landing.
  bump-k8s:
    name: Bump tesserix-k8s image tag via API
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    env:
      GH_TOKEN: ${{ secrets.TESSERIX_K8S_BOT }}
      REPO: tesserix/tesserix-k8s
      FILE_PATH: argocd/prod/apps/homechef/homechef-web.yaml
      SERVICE: homechef-web
    steps:
      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Install yq
        run: |
          set -euo pipefail
          if command -v yq >/dev/null; then yq --version; exit 0; fi
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Bump image tag and Knative updateTimestamp via API
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        run: |
          set -euo pipefail
          BOT_TOKEN="${GH_TOKEN}"
          NEW_TAG="main-${SHORT_SHA}"
          TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          API="https://api.github.com/repos/${REPO}/contents/${FILE_PATH}"
          AUTH_HDR=(-H "Authorization: Bearer ${BOT_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")

          for attempt in 1 2 3; do
            echo "::group::Attempt ${attempt}: fetch → bump → PUT"
            RESP="$(curl -sS "${AUTH_HDR[@]}" "${API}?ref=main")"
            BLOB_SHA="$(echo "$RESP" | jq -r '.sha // empty')"
            if [ -z "$BLOB_SHA" ]; then
              echo "GET failed:"; echo "$RESP" | jq -r '.message // .' | head -5
              echo "::endgroup::"; sleep 2; continue
            fi
            echo "$RESP" | jq -r .content | base64 -d > /tmp/current.yaml

            yq -i "(.spec.source.helm.parameters[] | select(.name == \"image.tag\")).value = \"${NEW_TAG}\"" /tmp/current.yaml
            NEW_TS="$TIMESTAMP" yq -i '(.spec.source.helm.parameters[] | select(.name | test("updateTimestamp$"))).value = strenv(NEW_TS)' /tmp/current.yaml
            echo "New values:"; grep -A1 "image\.tag\|updateTimestamp" /tmp/current.yaml | head -8

            NEW_CONTENT="$(base64 -w0 < /tmp/current.yaml)"
            PAYLOAD="$(jq -nc \
              --arg msg "chore(homechef): bump ${SERVICE} to ${NEW_TAG} (web-landing)" \
              --arg content "${NEW_CONTENT}" \
              --arg sha "${BLOB_SHA}" \
              --arg branch main \
              '{message:$msg, content:$content, sha:$sha, branch:$branch}')"

            PUT_RESP="$(curl -sS -X PUT "${AUTH_HDR[@]}" -H "Content-Type: application/json" -d "$PAYLOAD" "$API")"
            COMMIT_SHA="$(echo "$PUT_RESP" | jq -r '.commit.sha // empty')"
            if [ -n "$COMMIT_SHA" ]; then
              echo "Committed tesserix-k8s@${COMMIT_SHA}"; echo "::endgroup::"; exit 0
            fi
            echo "PUT failed:"; echo "$PUT_RESP" | jq -r '.message // .' | head -5
            echo "::endgroup::"; sleep 2
          done
          echo "Failed to bump after 3 attempts." >&2; exit 1

      - name: Bump Summary
        if: always()
        run: |
          echo "## Bump Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** tesserix-k8s ${{ env.FILE_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "**New tag:** \`main-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY

  test:
    name: Lint + Typecheck
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --filter @homechef/web-landing... --frozen-lockfile
      - name: Lint
        working-directory: apps/web-landing
        run: pnpm lint
      - name: Type check
        working-directory: apps/web-landing
        run: pnpm exec tsc --noEmit
