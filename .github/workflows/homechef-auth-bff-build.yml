name: HomeChef Auth BFF - CI Build

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
    paths:
      - 'apps/auth-bff/**'
      - '.github/workflows/homechef-auth-bff-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/auth-bff/**'
      - '.github/workflows/homechef-auth-bff-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REGISTRY: ghcr.io
  IMAGE_NAME: tesserix/home-chef-app/homechef-auth-bff

jobs:
  build:
    name: Build and Push HomeChef Auth BFF
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build and Push to GHCR (auto-mirrored to GAR ghcr-remote) ---
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Only emit `main-<sha7>` on main. No `:latest`. Deployment is
          # driven by Kargo, which derives image.tag = main-<sha7> from the
          # promoted commit (see homechef-ensure-image-tags). The branch tag
          # is kept so feature branches still produce a referenceable artifact.
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable=${{ github.event_name != 'pull_request' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=homechef-auth-bff
            org.opencontainers.image.description=HomeChef Auth BFF (GIP)

      - name: Compute cache ref
        id: cache
        run: echo "ref=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@v7
        with:
          context: apps/auth-bff
          file: apps/auth-bff/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.cache.outputs.ref }}
          # cache write needs GHCR auth (skipped on PRs); read-only cache-from still works
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0},mode=max', steps.cache.outputs.ref) || '' }}

      # --- Security scanning (gated: fails the build on CRITICAL+HIGH) ---
      - name: Run Trivy vulnerability scanner
        id: trivy
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build_push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          limit-severities-for-sarif: true

      - name: Upload Trivy results to GitHub Security tab
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application:** HomeChef Auth BFF" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture:** AMD64" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "**Docker Image:** Pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
            echo "**Deploy:** Kargo promotes via the deploy branch (homechef-ensure-image-tags)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "**Docker Image:** Built successfully (not pushed)" >> $GITHUB_STEP_SUMMARY
          fi

  test:
    name: Run Tests
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run unit tests
        working-directory: apps/auth-bff
        run: go test -race -coverprofile=coverage.out ./internal/...

      - name: Run integration tests
        working-directory: apps/auth-bff
        run: go test -race -tags=integration ./internal/... -run TestEndToEnd

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: auth-bff-coverage
          path: apps/auth-bff/coverage.out

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application:** HomeChef Auth BFF" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Unit + integration tests completed" >> $GITHUB_STEP_SUMMARY
