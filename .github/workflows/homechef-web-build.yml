name: HomeChef Web - CI Build (paused)

# ──────────────────────────────────────────────────────────────────────────────
# PAUSED — apps/web (the customer SPA) is temporarily DISABLED, planned to return.
# This workflow is kept (NOT deleted) so the web can be brought back. It is
# manual-dispatch only and never runs automatically. To reactivate, uncomment the
# push / pull_request triggers below.
# NOTE: the deploy job bumps the `homechef-web` ksvc slot, which currently serves
# the web-landing image — coordinate the cutover before re-enabling deploys.
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Push the image so Kargo deploys it to the homechef-web slot. WARNING: this OVERWRITES the live web-landing serving fe3dr.com. Leave false to only build-validate apps/web (no push, no deploy)."
        type: boolean
        default: false
  # Re-enable these when apps/web returns:
  # push:
  #   branches:
  #     - main
  #     - 'feat/**'
  #     - 'feature/**'
  #     - 'bugfix/**'
  #     - 'hotfix/**'
  #   paths:
  #     - 'apps/web/**'
  #     - 'packages/**'
  #     - 'pnpm-lock.yaml'
  #     - '.github/workflows/homechef-web-build.yml'
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - 'apps/web/**'
  #     - 'packages/**'
  #     - '.github/workflows/homechef-web-build.yml'

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REGISTRY: ghcr.io
  IMAGE_NAME: tesserix/home-chef-app/homechef-web

jobs:
  build:
    name: Build and Push HomeChef Web
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build and Push to GHCR ---
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Only emit `main-<sha7>` on main. No `:latest` — Kargo
          # promotes the newest matching tag from the GAR mirror via
          # the kargo-homechef Project's prod Stage.
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=homechef-web
            org.opencontainers.image.description=HomeChef Web Application

      - name: Compute cache ref
        id: cache
        run: echo "ref=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          # Guard against clobbering the live web-landing on the shared
          # homechef-web slot: only push (→ Kargo deploys) on an explicit
          # deploy=true dispatch. The default build-validates apps/web only.
          push: ${{ inputs.deploy == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://fe3dr.com/api/v1' }}
            VITE_BFF_URL=${{ vars.VITE_BFF_URL }}
            VITE_GIP_API_KEY=${{ secrets.GIP_WEB_API_KEY }}
            VITE_GIP_PROJECT_ID=tesseracthub-480811
            VITE_GIP_AUTH_DOMAIN=tesseracthub-480811.firebaseapp.com
            VITE_GIP_TENANT_ID=HomeChef-Customer-rqg8a
            VITE_GOOGLE_CLIENT_ID=849928263410-gri0fclh2pdbkgu3g3ppm6npa3kktib9.apps.googleusercontent.com
          secrets: |
            npm_token=${{ secrets.NPM_TOKEN }}
          cache-from: type=registry,ref=${{ steps.cache.outputs.ref }}
          cache-to: type=registry,ref=${{ steps.cache.outputs.ref }},mode=max

      # Image push only — deployment is handled by Kargo via the git commit
      # graph: the `homechef-ensure-image-tags` workflow guarantees every
      # service image carries a main-<sha> tag for the commit and then
      # fast-forwards the `deploy` branch, which the kargo-homechef prod Stage
      # promotes by writing image.tag = main-<sha7> into the ArgoCD apps.

      # --- Security scanning (gated: fails the build on CRITICAL+HIGH) ---
      - name: Run Trivy vulnerability scanner
        id: trivy
        # Scans the pushed image by digest, so only when we actually pushed.
        if: inputs.deploy == true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build_push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          limit-severities-for-sarif: true

      - name: Upload Trivy results to GitHub Security tab
        if: always() && inputs.deploy == true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application:** HomeChef Web" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture:** AMD64" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "**Docker Image:** Pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
            echo "**Deploy:** Kargo promotes via the deploy branch (homechef-ensure-image-tags)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "**Docker Image:** Built successfully (not pushed)" >> $GITHUB_STEP_SUMMARY
          fi

  test:
    name: Run Tests
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure npm for GitHub Packages
        run: |
          echo "@tesserix:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        working-directory: apps/web
        run: pnpm lint

      - name: Run type check
        working-directory: apps/web
        run: pnpm exec tsc --noEmit

      - name: Run tests
        working-directory: apps/web
        run: pnpm test -- --passWithNoTests
        continue-on-error: true

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application:** HomeChef Web" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Tests completed" >> $GITHUB_STEP_SUMMARY
