version: 2
updates:
  # --- Go backend services ---
  - package-ecosystem: gomod
    directory: "/apps/api"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      api-go:
        update-types: ["minor", "patch"]

  - package-ecosystem: gomod
    directory: "/apps/auth-bff"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      auth-bff-go:
        update-types: ["minor", "patch"]

  # --- JS/TS pnpm workspace (root lockfile covers all apps/* and packages/*) ---
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 15
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      js-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # vitest is pinned to v3 via the root pnpm override; v4 is a breaking
      # migration (its transform pipeline can't parse the RN/Flow `typeof`
      # syntax the mobile-shared screen tests import, breaking 4 tests). Adopt
      # it deliberately, not via an auto-bump. See PR #157.
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]

  # --- GitHub Actions ---
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns: ["*"]
